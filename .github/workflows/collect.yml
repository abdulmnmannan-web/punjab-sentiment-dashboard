name: Collect Punjab Sentiment Data

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install groq requests feedparser beautifulsoup4 lxml

      - name: Run collector
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python -u collector.py

      - name: Commit and push updated data
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add *.csv *.xlsx *.json || true
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update sentiment data" && git push)
